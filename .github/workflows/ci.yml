name: CI

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    name: typecheck + test + contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: OpenAPI drift check
        run: |
          npm run openapi:generate
          if ! git diff --exit-code openapi/openapi.json; then
            echo "::error::openapi.json is stale. Run 'npm run openapi:generate' and commit."
            exit 1
          fi

      - name: Integration tests (Vitest + testcontainers Postgres)
        run: npm test
        env:
          # Testcontainers needs Docker, present by default on ubuntu-latest
          # runners. Extend timeout for first-run image pull.
          TESTCONTAINERS_CHECKS_DISABLE: "true"

      - name: Docker build smoke
        run: docker build -t receipt-assistant:ci .
