# Root compose file — one command brings up the whole stack:
#
#   docker compose up -d --build
#
# Two independent units:
#   1. receipt-assistant + receipts-postgres (the app + its own DB)
#   2. Langfuse stack (optional developer observability, pulled in via
#      `include:`). Comment out the `include:` block below to run the app
#      without Langfuse — trace ingestion fails silently when the Langfuse
#      host is unreachable, so nothing else breaks.
#
# Requires Docker Compose v2.20+ for `include:` support.

include:
  - path: langfuse/docker-compose.yml

services:
  # ── Main app database ──────────────────────────────────────────────
  # Dedicated postgres for receipt-assistant. Kept separate from
  # Langfuse's postgres so the two stacks can be deployed independently.
  receipts-postgres:
    image: docker.io/postgres:17
    container_name: receipts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: receipts           # auto-created on first boot
      TZ: UTC
      PGTZ: UTC
    volumes:
      # App DB binary state. Bind-mount to a SIBLING dir outside any git repo
      # and outside iCloud — `~/Developer/receipt-assistant-data/postgres/`.
      # Why not inside this repo's data/? Because this repo is public on
      # GitHub and the DB binary contains extracted receipt PII (merchants,
      # amounts, line items). A `.gitignore` mishap or `git add -f` could
      # leak it. Why not in the outer iCloud-synced project? Because
      # iCloud's continuous block-level reupload is hostile to Postgres
      # fsync semantics. Sibling dir is the right side of both lines.
      # Survives OrbStack/Docker resets (host-side).
      - ${HOME}/Developer/receipt-assistant-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d receipts"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── Main app ───────────────────────────────────────────────────────
  receipt-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    image: receipt-assistant:local
    container_name: receipt-assistant
    depends_on:
      receipts-postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@receipts-postgres:5432/receipts
      # Langfuse is optional. If the Langfuse stack isn't running, the app
      # still works — trace ingestion is fire-and-forget and tolerates
      # connection failures.
      LANGFUSE_HOST: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: pk-receipt-local
      LANGFUSE_SECRET_KEY: sk-receipt-local
      # Tell the `claude` CLI explicitly where its config + credentials live.
      # Matches the Anthropic-official devcontainer convention and pairs with
      # the ./data/claude bind-mount below.
      CLAUDE_CONFIG_DIR: /home/node/.claude
      # Google Maps API key reachable by the in-container `claude -p` agent
      # via its Bash tool (for Phase 3 geocoding during extraction). Empty
      # is fine — the prompt instructs the agent to skip geocoding.
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      # Worker concurrency for `claude -p` extraction. Default 3 is fine
      # for steady-state single-receipt uploads but starves batch evals
      # (e.g. scripts/eval-dates.ts on a 23-fixture manifest). CPU floor is
      # ~10% even at concurrency 3 — host has headroom. Bumped to 6 to
      # halve eval wall-clock without straining Anthropic API rate limits.
      MAX_CLAUDE_CONCURRENCY: ${MAX_CLAUDE_CONCURRENCY:-6}
      # logo.dev API keys for #101 Phase 2 brand-icon acquisition. The
      # publishable key (pk_…) is embedded in img.logo.dev URLs the agent
      # follows; the secret key (sk_…) authorizes api.logo.dev/search,
      # which Phase 4b uses search-first to avoid the letter-fallback bug
      # (blind GET against img.logo.dev/<anydomain> returns a generated
      # first-letter PNG for unknown domains — silent wrong-icon). Empty
      # is fine — the agent skips the logo.dev tier when unset.
      LOGODEV_PUBLISHABLE_KEY: ${LOGODEV_PUBLISHABLE_KEY:-}
      LOGODEV_SECRET_KEY: ${LOGODEV_SECRET_KEY:-}
    volumes:
      # Uploaded receipt images = user content (PII). Lives in the outer
      # project's iCloud-synced docs root, so the user's own receipt corpus
      # syncs across their Macs naturally. NOT in any git repo — outer
      # project's .gitignore covers /data/, and these are never in this repo
      # anyway. If iCloud "Optimize Mac Storage" evicts files, the bind-mount
      # will return errors at read time; pin the dir via Finder → "Keep
      # Downloaded" to prevent that.
      - ${HOME}/Documents/10_Projects/2026_Dev_ReceiptAssistant/data/uploads:/data
      # Claude Code OAuth credentials + session state. Bind-mount to a
      # SIBLING dir outside any git repo and outside iCloud —
      # `~/Developer/receipt-assistant-data/claude/`. NOT inside this
      # public repo (`.credentials.json` is sensitive — keep it far from
      # `git add -f`). NOT a bind of host's `~/.claude/` — that caused
      # rotation collisions in Era 2. Container holds its own independent
      # OAuth session, seeded once via `docker exec -it receipt-assistant
      # claude /login`; the CLI self-refreshes and writes back here.
      # Survives compose down/up and OrbStack resets. See `setup` skill.
      - ${HOME}/Developer/receipt-assistant-data/claude:/home/node/.claude
      # Brand icon assets cache (#101 Phase 2). Each brand_assets row's
      # `local_path` is relative to /data/brand-assets/, structure:
      #   <brand_id>/<tier>/<origin-token>.<ext>
      # SIBLING dir same as postgres / claude — outside git (PII-adjacent
      # via the brands they identify) and outside iCloud (continuous
      # block reupload undermines `UNIQUE (brand_id, content_hash)`
      # dedup semantics on byte-equal re-fetch). On a fresh machine:
      #   mkdir -p ~/Developer/receipt-assistant-data/brand-assets
      - ${HOME}/Developer/receipt-assistant-data/brand-assets:/data/brand-assets
    restart: unless-stopped
