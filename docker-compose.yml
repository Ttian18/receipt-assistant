# Root compose file — one command brings up the whole stack:
#
#   docker compose up -d --build
#
# Two independent units:
#   1. receipt-assistant + receipts-postgres (the app + its own DB)
#   2. Langfuse stack (optional developer observability, pulled in via
#      `include:`). Comment out the `include:` block below to run the app
#      without Langfuse — trace ingestion fails silently when the Langfuse
#      host is unreachable, so nothing else breaks.
#
# Requires Docker Compose v2.20+ for `include:` support.

include:
  - path: langfuse/docker-compose.yml

services:
  # ── Main app database ──────────────────────────────────────────────
  # Dedicated postgres for receipt-assistant. Kept separate from
  # Langfuse's postgres so the two stacks can be deployed independently.
  receipts-postgres:
    image: docker.io/postgres:17
    container_name: receipts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: receipts           # auto-created on first boot
      TZ: UTC
      PGTZ: UTC
    volumes:
      - receipts-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d receipts"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── Main app ───────────────────────────────────────────────────────
  receipt-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    image: receipt-assistant:local
    container_name: receipt-assistant
    depends_on:
      receipts-postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@receipts-postgres:5432/receipts
      # Langfuse is optional. If the Langfuse stack isn't running, the app
      # still works — trace ingestion is fire-and-forget and tolerates
      # connection failures.
      LANGFUSE_HOST: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: pk-receipt-local
      LANGFUSE_SECRET_KEY: sk-receipt-local
      # Tell the `claude` CLI explicitly where its config + credentials live.
      # Matches the Anthropic-official devcontainer convention and pairs with
      # the `claude-code-config` named volume mounted below.
      CLAUDE_CONFIG_DIR: /home/node/.claude
      # Google Maps API key reachable by the in-container `claude -p` agent
      # via its Bash tool (for Phase 3 geocoding during extraction). Empty
      # is fine — the prompt instructs the agent to skip geocoding.
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    volumes:
      - receipt-data:/data
      # Claude Code OAuth credentials live in a **named Docker volume**,
      # NOT a bind mount of the host's `~/.claude/`. The container holds its
      # own independent OAuth session (seeded once via
      # `docker exec -it receipt-assistant claude /login`) and self-refreshes
      # forever without colliding with host or other containers.
      # See the `setup` skill for bootstrap and recovery procedures.
      - claude-code-config:/home/node/.claude
    restart: unless-stopped

volumes:
  receipt-data:
  receipts-postgres-data:
  # Holds the container's Claude Code credentials + config. Persists across
  # `docker compose down` / `up` / `restart`. `docker compose down -v` WIPES
  # it — that loses the OAuth session and requires another `claude /login`.
  claude-code-config:
